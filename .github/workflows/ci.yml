name: CI - Build & Benchmark

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-matrix:
    name: Build (${{ matrix.config }})
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - config: base
            enable_orc: OFF
            enable_lance: OFF
            enable_tests: ON
            need_rust: false
            submodules: selective
          - config: orc
            enable_orc: ON
            enable_lance: OFF
            enable_tests: ON
            need_rust: false
            submodules: selective
          - config: lance
            enable_orc: OFF
            enable_lance: ON
            enable_tests: ON
            need_rust: true
            submodules: recursive

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: ${{ matrix.submodules }}
          fetch-depth: 1

      - name: Checkout selective submodules (non-lance builds)
        if: matrix.submodules == 'selective'
        run: |
          git submodule update --init --depth 1 -- third_party/tpch
          git submodule update --init --depth 1 -- third_party/googletest

      - name: Install system dependencies
        run: bash scripts/ci_install_deps.sh

      - name: Install Rust toolchain (lance build only)
        if: matrix.need_rust == true
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93.0
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          # Install mold linker for faster Rust builds
          sudo apt-get update && sudo apt-get install -y mold

      - name: Verify Rust installation
        if: matrix.need_rust == true
        run: |
          source $HOME/.cargo/env
          rustc --version
          cargo --version

      - name: Create cache directories
        run: |
          mkdir -p /home/runner/dependencies/{lib,include}/{cmake,pkgconfig}
          mkdir -p /home/runner/dependencies/include/{arrow,parquet,orc}

      - name: Restore Cargo cache (lance build only)
        if: matrix.need_rust == true
        uses: actions/cache@v4
        with:
          path: build/rust/
          key: cargo-cache-${{ hashFiles('third_party/lance-ffi/Cargo.lock') }}
          restore-keys: cargo-cache-

      - name: Restore Arrow and ORC cache
        if: matrix.enable_orc == 'ON'
        id: cache-arrow-orc
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/dependencies/lib/libarrow*
            /home/runner/dependencies/lib/libparquet*
            /home/runner/dependencies/lib/liborc*
            /home/runner/dependencies/lib/cmake/arrow
            /home/runner/dependencies/lib/cmake/orc
            /home/runner/dependencies/lib/pkgconfig/arrow*
            /home/runner/dependencies/lib/pkgconfig/liborc*
            /home/runner/dependencies/include/arrow
            /home/runner/dependencies/include/parquet
            /home/runner/dependencies/include/orc
          key: arrow-orc-cache-${{ hashFiles('.gitmodules', 'scripts/ci_build_arrow_and_orc.sh') }}
          restore-keys: arrow-orc-cache-

      - name: Restore Arrow and Parquet cache (non-ORC builds)
        if: matrix.enable_orc == 'OFF'
        id: cache-arrow-parquet
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/dependencies/lib/libarrow*
            /home/runner/dependencies/lib/libparquet*
            /home/runner/dependencies/lib/cmake/arrow
            /home/runner/dependencies/lib/pkgconfig/arrow*
            /home/runner/dependencies/include/arrow
            /home/runner/dependencies/include/parquet
          key: arrow-parquet-cache-${{ hashFiles('.gitmodules', 'scripts/ci_build_arrow_and_orc.sh') }}
          restore-keys: arrow-parquet-cache-

      - name: Build Arrow and ORC from source
        if: matrix.enable_orc == 'ON' && steps.cache-arrow-orc.outputs.cache-hit != 'true'
        run: bash scripts/ci_build_arrow_and_orc.sh ON /home/runner/dependencies

      - name: Build Arrow and Parquet from source (non-ORC builds)
        if: matrix.enable_orc == 'OFF' && steps.cache-arrow-parquet.outputs.cache-hit != 'true'
        run: bash scripts/ci_build_arrow_and_orc.sh OFF /home/runner/dependencies

      - name: Configure CMake
        run: |
          source $HOME/.cargo/env 2>/dev/null || true
          cmake -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH=/home/runner/dependencies \
            -DTPCH_ENABLE_ORC=${{ matrix.enable_orc }} \
            -DTPCH_ENABLE_LANCE=${{ matrix.enable_lance }} \
            -DTPCH_ENABLE_ASYNC_IO=ON \
            -DTPCH_ENABLE_ASAN=OFF \
            -DTPCH_BUILD_TESTS=${{ matrix.enable_tests }}

      - name: Build project
        run: |
          source $HOME/.cargo/env 2>/dev/null || true
          cmake --build build -j$(nproc)

      - name: Verify executable and tests
        run: |
          test -f build/tpch_benchmark && echo "✓ tpch_benchmark created"
          test -f build/tests/buffer_lifetime_manager_test && echo "✓ buffer_lifetime_manager_test created" || true
          test -f build/tests/dbgen_batch_iterator_test && echo "✓ dbgen_batch_iterator_test created" || true
          if [ "${{ matrix.enable_lance }}" = "ON" ]; then
            test -f build/tests/lance_writer_test && echo "✓ lance_writer_test created" || echo "✗ lance_writer_test missing"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpch-benchmark-${{ matrix.config }}
          path: |
            build/tpch_benchmark
            build/tests/*_test
          retention-days: 1
          if-no-files-found: error

  unit-tests:
    name: Unit Tests (${{ matrix.config }})
    runs-on: ubuntu-22.04
    needs: build-matrix
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        config: [base, orc, lance]

    steps:
      - name: Checkout code (for dists.dss)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout tpch submodule (for dists.dss)
        run: git submodule update --init --depth 1 -- third_party/tpch

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: tpch-benchmark-${{ matrix.config }}
          path: build

      - name: Setup test executables
        run: |
          chmod +x build/tests/*_test 2>/dev/null || true
          # Copy dists.dss to build directory for tests
          cp -r third_party/tpch/dbgen/dists.dss build/

      - name: Run unit tests
        run: |
          cd build/tests
          
          # Define which tests to run for each configuration
          case "${{ matrix.config }}" in
            base)
              # Run common/core tests only in base build
              TESTS="buffer_lifetime_manager_test dbgen_batch_iterator_test"
              ;;
            orc)
              # ORC doesn't have format-specific tests yet, skip to avoid redundancy
              TESTS=""
              echo "No ORC-specific tests to run (common tests run in base config)"
              ;;
            lance)
              # Run Lance-specific tests only
              TESTS="lance_writer_test"
              ;;
            *)
              echo "Unknown config: ${{ matrix.config }}"
              exit 1
              ;;
          esac
          
          # Run the specified tests
          for test_name in $TESTS; do
            if [ -x "$test_name" ]; then
              echo "============================"
              echo "Running: $test_name"
              echo "============================"
              "./$test_name" --gtest_output=xml:"${test_name}_results.xml" || exit 1
            else
              echo "ERROR: Expected test executable not found: $test_name"
              exit 1
            fi
          done

  benchmark-suite:
    name: Benchmark Suite
    runs-on: ubuntu-22.04
    needs: build-matrix
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          # CSV format - all tables
          - format: csv
            table: lineitem
            build: base
          - format: csv
            table: orders
            build: base
          - format: csv
            table: customer
            build: base
          - format: csv
            table: part
            build: base
          - format: csv
            table: partsupp
            build: base
          - format: csv
            table: supplier
            build: base
          - format: csv
            table: nation
            build: base
          - format: csv
            table: region
            build: base
          # Parquet format - all tables
          - format: parquet
            table: lineitem
            build: base
          - format: parquet
            table: orders
            build: base
          - format: parquet
            table: customer
            build: base
          - format: parquet
            table: part
            build: base
          - format: parquet
            table: partsupp
            build: base
          - format: parquet
            table: supplier
            build: base
          - format: parquet
            table: nation
            build: base
          - format: parquet
            table: region
            build: base
          # ORC format - lineitem, customer, orders
          - format: orc
            table: lineitem
            build: orc
          - format: orc
            table: customer
            build: orc
          - format: orc
            table: orders
            build: orc
          # Lance format - lineitem, customer, orders
          - format: lance
            table: lineitem
            build: lance
          - format: lance
            table: customer
            build: lance
          - format: lance
            table: orders
            build: lance

    steps:
      - name: Checkout code (for dists.dss and scripts)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout tpch submodule (for dists.dss)
        run: git submodule update --init --depth 1 -- third_party/tpch

      - name: Install dependencies
        run: bash scripts/ci_install_deps.sh

      - name: Create cache directories
        run: |
          mkdir -p /home/runner/dependencies/{lib,include}/{cmake,pkgconfig}
          mkdir -p /home/runner/dependencies/include/{arrow,parquet,orc}

      - name: Restore Arrow and ORC cache (ORC builds)
        if: matrix.build == 'orc'
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/dependencies/lib/libarrow*
            /home/runner/dependencies/lib/libparquet*
            /home/runner/dependencies/lib/liborc*
            /home/runner/dependencies/lib/cmake/arrow
            /home/runner/dependencies/lib/cmake/orc
            /home/runner/dependencies/lib/pkgconfig/arrow*
            /home/runner/dependencies/lib/pkgconfig/liborc*
            /home/runner/dependencies/include/arrow
            /home/runner/dependencies/include/parquet
            /home/runner/dependencies/include/orc
          key: arrow-orc-cache-${{ hashFiles('.gitmodules', 'scripts/ci_build_arrow_and_orc.sh') }}
          restore-keys: arrow-orc-cache-

      - name: Restore Arrow and Parquet cache (non-ORC builds)
        if: matrix.build != 'orc'
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/dependencies/lib/libarrow*
            /home/runner/dependencies/lib/libparquet*
            /home/runner/dependencies/lib/cmake/arrow
            /home/runner/dependencies/lib/pkgconfig/arrow*
            /home/runner/dependencies/include/arrow
            /home/runner/dependencies/include/parquet
          key: arrow-parquet-cache-${{ hashFiles('.gitmodules', 'scripts/ci_build_arrow_and_orc.sh') }}
          restore-keys: arrow-parquet-cache-

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: tpch-benchmark-${{ matrix.build }}
          path: .

      - name: Setup benchmark executable
        run: |
          chmod +x tpch_benchmark
          mkdir -p benchmark-results
          # Setup library path to use cached dependencies
          export LD_LIBRARY_PATH=/home/runner/dependencies/lib:$LD_LIBRARY_PATH
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Verify executable supports required format
        run: |
          echo "=== Verifying build artifact ==="
          echo "Expected format: ${{ matrix.format }}"
          echo "Expected build: ${{ matrix.build }}"
          ./tpch_benchmark --help | head -20 || true
          
          # Verify the build supports the expected format
          if [ "${{ matrix.format }}" = "lance" ]; then
            if ./tpch_benchmark --format lance --help 2>&1 | grep -qi "unknown format"; then
              echo "ERROR: Downloaded executable does not support lance format"
              echo "This indicates the wrong build artifact was used"
              exit 1
            fi
          fi

      - name: Verify library installation
        run: |
          echo "=== Current LD_LIBRARY_PATH ==="
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo ""
          echo "=== Searching for libparquet ==="
          find /home/runner/dependencies -name "libparquet*" 2>/dev/null | head -5 || echo "libparquet not found"
          echo ""
          echo "=== Searching for liborc ==="
          find /home/runner/dependencies -name "liborc*" 2>/dev/null | head -5 || echo "liborc not found"

      - name: Run format coverage benchmark
        run: |
          if ! timeout 600 ./tpch_benchmark \
            --use-dbgen \
            --scale-factor 1 \
            --format ${{ matrix.format }} \
            --table ${{ matrix.table }} \
            --output-dir benchmark-results/ \
            2>&1 | grep -v "^DEBUG:" | tee "benchmark-results/${{ matrix.format }}_${{ matrix.table }}_baseline.log"; then
            echo "ERROR: Benchmark failed with exit code $?"
            exit 1
          fi

          # Fail if process dumped core
          if grep -q "dumped core" "benchmark-results/${{ matrix.format }}_${{ matrix.table }}_baseline.log"; then
            echo "ERROR: Benchmark crashed with core dump"
            exit 1
          fi

          # Fail if unsupported format
          if grep -qi "unknown format\|unsupported format\|not supported" "benchmark-results/${{ matrix.format }}_${{ matrix.table }}_baseline.log"; then
            echo "ERROR: Format ${{ matrix.format }} not supported by this build"
            exit 1
          fi

      - name: Upload benchmark logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-logs-suite-${{ matrix.format }}-${{ matrix.table }}
          path: benchmark-results/${{ matrix.format }}_${{ matrix.table }}_baseline.log
          retention-days: 30
          if-no-files-found: ignore

  optimization-benchmarks:
    name: Optimization Benchmarks (${{ matrix.format }}-${{ matrix.mode }})
    runs-on: ubuntu-22.04
    needs: build-matrix
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        format: [parquet, lance]
        mode: [baseline, zero-copy, true-zero-copy]
        table: [lineitem, orders, part]

    steps:
      - name: Checkout code (for dists.dss and scripts)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout tpch submodule (for dists.dss)
        run: git submodule update --init --depth 1 -- third_party/tpch

      - name: Install dependencies
        run: bash scripts/ci_install_deps.sh

      - name: Create cache directories
        run: |
          mkdir -p /home/runner/dependencies/{lib,include}/{cmake,pkgconfig}
          mkdir -p /home/runner/dependencies/include/{arrow,parquet,orc}

      - name: Restore Arrow and Parquet cache
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/dependencies/lib/libarrow*
            /home/runner/dependencies/lib/libparquet*
            /home/runner/dependencies/lib/cmake/arrow
            /home/runner/dependencies/lib/pkgconfig/arrow*
            /home/runner/dependencies/include/arrow
            /home/runner/dependencies/include/parquet
          key: arrow-parquet-cache-${{ hashFiles('.gitmodules', 'scripts/ci_build_arrow_and_orc.sh') }}
          restore-keys: arrow-parquet-cache-

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: tpch-benchmark-${{ matrix.format == 'parquet' && 'base' || 'lance' }}
          path: .

      - name: Setup benchmark executable
        run: |
          chmod +x tpch_benchmark
          mkdir -p benchmark-results
          # Setup library path to use cached dependencies
          export LD_LIBRARY_PATH=/home/runner/dependencies/lib:$LD_LIBRARY_PATH
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Verify executable supports required format
        run: |
          echo "=== Verifying build artifact ==="
          echo "Expected format: ${{ matrix.format }}"
          ./tpch_benchmark --help | head -20 || true
          
          # Verify the build supports the expected format
          if [ "${{ matrix.format }}" = "lance" ]; then
            if ./tpch_benchmark --format lance --help 2>&1 | grep -qi "unknown format"; then
              echo "ERROR: Downloaded executable does not support lance format"
              echo "This indicates the wrong build artifact was used"
              exit 1
            fi
          fi

      - name: Run optimization benchmark
        run: |
          MODE_FLAGS=""
          if [ "${{ matrix.mode }}" = "zero-copy" ]; then
            MODE_FLAGS="--zero-copy"
          elif [ "${{ matrix.mode }}" = "true-zero-copy" ]; then
            MODE_FLAGS="--true-zero-copy"
          fi

          if ! timeout 600 ./tpch_benchmark \
            --use-dbgen \
            --scale-factor 1 \
            --format ${{ matrix.format }} \
            --table ${{ matrix.table }} \
            --output-dir benchmark-results/ \
            $MODE_FLAGS \
            2>&1 | grep -v "^DEBUG:" | tee "benchmark-results/${{ matrix.format }}_${{ matrix.table }}_${{ matrix.mode }}.log"; then
            echo "ERROR: Benchmark failed with exit code $?"
            exit 1
          fi

          # Fail if process dumped core
          if grep -q "dumped core" "benchmark-results/${{ matrix.format }}_${{ matrix.table }}_${{ matrix.mode }}.log"; then
            echo "ERROR: Benchmark crashed with core dump"
            exit 1
          fi

          # Fail if unsupported format
          if grep -qi "unknown format\|unsupported format\|not supported" "benchmark-results/${{ matrix.format }}_${{ matrix.table }}_${{ matrix.mode }}.log"; then
            echo "ERROR: Format ${{ matrix.format }} not supported by this build"
            exit 1
          fi

      - name: Upload benchmark logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-logs-optimization-${{ matrix.format }}-${{ matrix.mode }}-${{ matrix.table }}
          path: benchmark-results/${{ matrix.format }}_${{ matrix.table }}_${{ matrix.mode }}.log
          retention-days: 30
          if-no-files-found: ignore

  results-aggregation:
    name: Aggregate Results
    runs-on: ubuntu-22.04
    needs: [benchmark-suite, optimization-benchmarks]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Prepare benchmark results directory
        run: |
          mkdir -p benchmark-results
          find all-results -name "*.log" -exec cp {} benchmark-results/ \;

      - name: Generate summary report
        run: |
          python3 scripts/parse_benchmark_logs.py benchmark-results > benchmark-results/ci_summary.json || true

      - name: Generate HTML visualization
        if: always()
        run: |
          if [ -f benchmark-results/ci_summary.json ]; then
            python3 scripts/visualize_benchmark_results.py benchmark-results/ci_summary.json benchmark-results/report.html
          else
            echo "No summary JSON found, skipping visualization"
          fi

      - name: Upload aggregated results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results/*.log
            benchmark-results/*.json
            benchmark-results/*.html
          retention-days: 30
          if-no-files-found: ignore

      - name: Print summary
        if: always()
        run: |
          if [ -f benchmark-results/ci_summary.json ]; then
            echo "=== Benchmark Summary ==="
            python3 -m json.tool benchmark-results/ci_summary.json || cat benchmark-results/ci_summary.json
          else
            echo "No summary generated (logs may not exist yet)"
          fi

  status-check:
    name: Status Check
    runs-on: ubuntu-22.04
    needs: [build-matrix, unit-tests]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-matrix.result }}" = "success" ] && [ "${{ needs.unit-tests.result }}" = "success" ]; then
            echo "✓ All builds and tests passed"
            exit 0
          else
            echo "✗ Some builds or tests failed"
            echo "Build status: ${{ needs.build-matrix.result }}"
            echo "Test status: ${{ needs.unit-tests.result }}"
            exit 1
          fi
