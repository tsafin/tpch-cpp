name: Build Docker Images

on:
  push:
    branches:
      - master
      - develop
    paths:
      - '.docker/**'
      - 'scripts/build_*.sh'
      - 'third_party/arrow'
      - 'third_party/orc'
      - 'third_party/lance-ffi'
      - '.github/workflows/docker-images.yml'
  workflow_dispatch:
    inputs:
      image:
        description: 'Which image to build'
        required: true
        type: choice
        options:
          - all
          - base
          - orc
          - lance

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/tpch-cpp

jobs:
  build-base:
    name: Build Base Image
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || github.event.inputs.image == 'all' || github.event.inputs.image == 'base'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile.base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_PREFIX }}-base:latest
            type=gha
          cache-to: type=gha,mode=max

  build-orc:
    name: Build ORC Image
    runs-on: ubuntu-22.04
    needs: build-base
    if: github.event_name == 'push' || github.event.inputs.image == 'all' || github.event.inputs.image == 'orc'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-orc
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push ORC image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile.orc
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_PREFIX }}-orc:latest
            type=registry,ref=${{ env.IMAGE_PREFIX }}-base:latest
            type=gha
          cache-to: type=gha,mode=max

  build-lance:
    name: Build Lance Image
    runs-on: ubuntu-22.04
    needs: build-base
    if: github.event_name == 'push' || github.event.inputs.image == 'all' || github.event.inputs.image == 'lance'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-lance
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push Lance image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile.lance
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_PREFIX }}-lance:latest
            type=registry,ref=${{ env.IMAGE_PREFIX }}-base:latest
            type=gha
          cache-to: type=gha,mode=max
